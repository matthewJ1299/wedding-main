# Default stack: no host port bindings (Coolify / Traefik friendly).
# Production public URLs are the defaults below; override any value via `.env` or your platform UI.
#
# Local laptop: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wedding}
      POSTGRES_USER: ${POSTGRES_USER:-wedding}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wedding}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./Wedding/backend
      dockerfile: Dockerfile
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      UPLOAD_DIR: /data/uploads
      BACKUP_DIR: /data/backups
      DATABASE_URL: ${DATABASE_URL:-postgres://wedding:wedding@postgres:5432/wedding}
      FRONTEND_URL: ${FRONTEND_URL:-https://matthewandsydney.co.za}
      ORIGIN_URL: ${ORIGIN_URL:-https://matthewandsydney.co.za}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      # Set true on Coolify (or once locally) to DELETE all email_templates and insert defaults only
      REPLACE_EMAIL_TEMPLATES: ${REPLACE_EMAIL_TEMPLATES:-false}
    volumes:
      - wedding_data:/data
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./Wedding/frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-https://api.matthewandsydney.co.za}
        REACT_APP_SITE_URL: ${REACT_APP_SITE_URL:-https://matthewandsydney.co.za}
        REACT_APP_SHOW_LANDING_POPUP: ${REACT_APP_SHOW_LANDING_POPUP:-false}
        REACT_APP_LANDING_POPUP_MESSAGE: ${REACT_APP_LANDING_POPUP_MESSAGE:-}
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  postgres_data:
  wedding_data:
