# Laptop testing: publish host ports + localhost URLs for CORS and CRA build args.
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
#
# Backend container must use hostname `postgres` (see base docker-compose.yml DATABASE_URL).
# Postgres is also published on localhost:5432 for running the backend outside Docker (npm run dev).

services:
  postgres:
    ports:
      - "5432:5432"

  backend:
    ports:
      - "3001:3001"
    environment:
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      ORIGIN_URL: ${ORIGIN_URL:-http://localhost:8080}

  frontend:
    ports:
      - "8080:80"
    build:
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:3001}
        REACT_APP_SITE_URL: ${REACT_APP_SITE_URL:-http://localhost:8080}
        REACT_APP_SHOW_LANDING_POPUP: ${REACT_APP_SHOW_LANDING_POPUP:-false}
        REACT_APP_LANDING_POPUP_MESSAGE: ${REACT_APP_LANDING_POPUP_MESSAGE:-}
